<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thank you for applying to volunteer with The Green Tape Measure.">
  <meta name="robots" content="noindex, nofollow">
  <title>Application Received — The Green Tape Measure</title>
  <link rel="stylesheet" href="/assets/fonts/fontawesome/css/all.css">
  <link rel="stylesheet" href="dist/output.css" />
</head>

<body class="min-h-screen flex flex-col items-center justify-center gap-10 p-8 text-center">
  <main id="main-content" class="flex flex-col items-center gap-6 max-w-lg">
    <picture>
      <source srcset="assets/images/takeaction-scrib.webp" media="all" data-theme="dark, light">
      <img src="assets/images/takeaction-scrib.png"
        alt="Scrib, the GTM mascot, a cross between a monkey and an otter, facing forward with a magnifying glass to its right eye"
        class="h-40">
    </picture>
    <div class="flex flex-col gap-3">
      <p class="paragraph-accent">Application Received</p>
      <div class="flex items-center justify-center gap-4">
        <picture>
          <source srcset="assets/images/logo-dk.webp" type="image/webp" media="all" data-theme="dark">
          <source srcset="assets/images/logo-lt.webp" type="image/webp" media="all" data-theme="light">
          <img src="assets/images/logo-lt.png" alt="GTM logo that resembles a green tape measure" class="h-[45px]">
        </picture>
        <h1 class="text-2xl text-neutral-9 font-heading font-bold">Welcome to the Investigation!</h1>
      </div>
      <p class="paragraph-md">Scrib and the GTM team have received your volunteer interest form. We'll review your
        application and reach out soon — keep an eye on your inbox.</p>
    </div>
    <a href="/#takeaction" class="btn btn-lg btn-cta">Return to Take Action</a>

  </main>
</body>

</html>
